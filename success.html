<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil | Sllowly Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E">
<base target="_blank">
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="logo"><div class="logo-icon">S</div><span>Sllowly Store</span></a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#produk">Produk</a></li>
            </ul>
            <div class="nav-actions">
                <a href="https://wa.me/628998915333" class="btn btn-whatsapp btn-sm" target="_blank">Chat WA</a>
                <div class="mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2 class="success-title">Pembayaran Berhasil!</h2>
            <p class="success-text">
                Pembayaran Anda telah berhasil dikonfirmasi.<br>
                Silakan hubungi admin agar order dapat segera diproses.
            </p>
            <div style="background:var(--darker);border-radius:var(--radius);padding:20px;margin-bottom:32px;text-align:left;">
                <p style="font-size:0.9rem;color:var(--text-muted);line-height:1.8;">
                    <strong style="color:var(--text);">Detail Order:</strong><br>
                    <span id="detailOrder">Memuat...</span>
                </p>
            </div>
            <a href="https://wa.me/628998915333?text=Halo%20admin%20Sllowly%20Store%2C%20saya%20sudah%20melakukan%20pembayaran." 
               class="btn btn-whatsapp btn-lg btn-full" target="_blank">
                Chat WhatsApp
            </a>
            <a href="index.html" class="btn btn-outline btn-full" style="margin-top:12px;">
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const checkoutData = JSON.parse(localStorage.getItem('sllowly_checkout') || '{}');
        if(checkoutData.produk) {
            document.getElementById('detailOrder').innerHTML = 
                'Produk: ' + checkoutData.produk + '<br>' +
                'Total: Rp' + (checkoutData.harga || 0).toLocaleString('id-ID') + '<br>' +
                'Nama: ' + (checkoutData.nama || '-') + '<br>' +
                'WhatsApp: ' + (checkoutData.whatsapp || '-');
        } else {
            document.getElementById('detailOrder').textContent = 'Data order tidak ditemukan';
        }
    </script>
</body>
</html>
